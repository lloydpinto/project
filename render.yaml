services:
  - type: web
    name: authorized-partners
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///authorized_partners.db
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health